# HoneyBadger Sentinel - Logrotate Configuration
# Install: sudo cp config/logrotate.conf /etc/logrotate.d/hbv-sentinel

/var/log/hbv-sentinel/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # Send SIGHUP to reload log files if using file handlers
        systemctl reload hbv-sentinel-collector 2>/dev/null || true
        systemctl reload hbv-sentinel 2>/dev/null || true
    endscript
}

/var/log/hbv-sentinel.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
}
